<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Magazzino Noleggio v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK (compat v10 — stabile con questo codice) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <!-- QR Code generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- QR Code scanner -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #141416;
            --bg-tertiary: #303030;
            --bg-card: #1e1e21;
            --border: #2a2a2e;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a5;
            --text-muted: #6b6b70;
            --accent: #00d4aa;
            --accent-hover: #00f5c4;
            --warning: #ffaa00;
            --danger: #ff4757;
            --success: #00d4aa;
            --info: #3b82f6;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
        }
        #loginScreen.hidden { display: none; }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .login-logo {
            width: 64px; height: 64px;
            background: var(--accent);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }

        .login-title {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .btn-google {
            width: 100%;
            padding: 1rem;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .btn-google:hover { background: #f0f0f0; transform: translateY(-1px); }
        .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }

        .google-icon {
            width: 20px; height: 20px;
        }

        .login-error {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(255,71,87,0.1);
            border-radius: 8px;
            display: none;
        }

        .login-loading {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        /* ===== SYNC INDICATOR ===== */
        .sync-indicator {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 99px;
            font-family: 'Space Mono', monospace;
        }
        .sync-indicator.synced { background: rgba(0,212,170,0.1); color: var(--success); }
        .sync-indicator.syncing { background: rgba(255,170,0,0.1); color: var(--warning); }
        .sync-indicator.error { background: rgba(255,71,87,0.1); color: var(--danger); }
        .sync-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: currentColor;
        }
        .sync-dot.pulse { animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ===== USER MENU ===== */
        .user-menu {
            display: flex; align-items: center; gap: 0.5rem;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--accent);
            color: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700;
            cursor: pointer;
            border: 2px solid var(--border);
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* ===== SCANNER PAGE ===== */
        #scannerPage {
            position: fixed; inset: 0; z-index: 500;
            background: #000;
            display: flex; flex-direction: column;
        }
        #scannerPage.hidden { display: none; }

        .scanner-header {
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: space-between;
        }

        .scanner-title {
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            font-size: 1rem;
        }

        #reader {
            flex: 1;
            min-height: 0;
        }

        #reader > div { border-radius: 0 !important; }

        .scanner-result {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1.5rem;
            min-height: 160px;
        }

        .scanner-result-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .scanner-unit-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
        }

        .scanner-unit-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .scanner-unit-serial { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; }

        .scanner-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        /* ===== QR MODAL ===== */
        .qr-container {
            display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
            padding: 1rem;
        }
        #qrCodeCanvas {
            background: white;
            padding: 1rem;
            border-radius: 8px;
        }
        .qr-label {
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: var(--bg-primary);
            font-size: 1rem;
        }

        .search-container { flex: 1; max-width: 500px; }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
        .search-input:disabled { opacity: 0.5; cursor: not-allowed; }

        .search-wrapper { position: relative; }

        .search-wrapper::before {
            content: "⌕";
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1rem;
        }

        .header-actions { display: flex; gap: 0.75rem; align-items: center; }

        /* Warehouse Tabs */
        .warehouse-tabs {
            max-width: 1600px; margin: 0 auto;
            display: flex; gap: 0; padding-top: 1rem;
        }

        .warehouse-tab {
            flex: 1;
            padding: 0.875rem 1.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-bottom: none;
            color: var(--text-secondary);
            font-family: inherit; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.03em;
        }

        .warehouse-tab:first-child { border-radius: 8px 0 0 0; }
        .warehouse-tab:last-child { border-radius: 0 8px 0 0; }
        .warehouse-tab:hover { background: var(--bg-card); color: var(--text-primary); }
        .warehouse-tab.active { background: #f5c518; color: #000; border-color: #f5c518; }

        /* Buttons */
        .btn {
            padding: 0.625rem 1rem;
            border: none; border-radius: 6px;
            font-family: inherit; font-size: 0.875rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }

        .btn-primary { background: var(--accent); color: var(--bg-primary); }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-card); border-color: var(--text-muted); }
        .btn-danger { background: rgba(255,71,87,0.1); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
        .btn-danger:hover { background: rgba(255,71,87,0.2); }
        .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; }
        .btn-warning { background: rgba(255,170,0,0.1); color: var(--warning); border: 1px solid rgba(255,170,0,0.3); }
        .btn-warning:hover { background: rgba(255,170,0,0.2); }

        /* Main Layout */
        .main-container {
            max-width: 1600px; margin: 0 auto; padding: 2rem;
            display: grid; grid-template-columns: 280px 1fr; gap: 2rem;
        }
        .main-container.no-sidebar { grid-template-columns: 1fr; }

        .general-home { text-align: center; padding: 2rem 0; }
        .home-content { margin-top: 2rem; }

        .home-cards-container {
            display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-bottom: 2rem;
        }

        .home-card { max-width: 350px; width: 100%; text-align: left; }
        .home-card.clickable { cursor: pointer; transition: all 0.2s; }
        .home-card.clickable:hover { border-color: var(--accent); transform: translateY(-2px); }
        .click-hint { margin-top: 1rem; font-size: 0.8rem; color: var(--accent); }

        /* Jobs View */
        .jobs-container { max-width: 1200px; margin: 0 auto; }
        .job-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; overflow: hidden; }
        .job-card.completed { opacity: 0.6; }
        .job-header { padding: 1.25rem; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); }
        .job-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .job-date { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--warning); }
        .job-date.past { color: var(--danger); }
        .job-body { padding: 1.25rem; }
        .job-section { margin-bottom: 1.25rem; }
        .job-section:last-child { margin-bottom: 0; }
        .job-section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.75rem; }
        .job-notes { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; }
        .material-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .material-item { background: var(--bg-tertiary); padding: 0.75rem 1rem; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .material-item.external { border-left: 3px solid var(--warning); }
        .material-name { font-weight: 500; }
        .material-details { color: var(--text-muted); font-size: 0.8rem; }
        .material-qty { font-family: 'Space Mono', monospace; color: var(--accent); }
        .job-status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.8rem; font-weight: 500; }
        .job-status-badge.pending { background: rgba(255,170,0,0.1); color: var(--warning); }
        .job-status-badge.completed { background: rgba(0,212,170,0.1); color: var(--success); }

        .material-selector { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; max-height: 300px; overflow-y: auto; }
        .material-selector-item { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .material-selector-item:last-child { border-bottom: none; }
        .material-selector-item input[type="number"] { width: 60px; padding: 0.25rem 0.5rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); font-family: 'Space Mono', monospace; }

        .external-materials-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
        .external-material-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 0.5rem; align-items: center; }
        .external-material-row input { padding: 0.5rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); font-family: inherit; font-size: 0.85rem; }
        .external-material-row button { padding: 0.5rem; background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); border-radius: 4px; color: var(--danger); cursor: pointer; }
        .add-external-btn { margin-top: 0.5rem; padding: 0.5rem 1rem; background: var(--bg-tertiary); border: 1px dashed var(--border); border-radius: 6px; color: var(--text-secondary); cursor: pointer; font-family: inherit; font-size: 0.85rem; width: 100%; transition: all 0.2s; }
        .add-external-btn:hover { border-color: var(--accent); color: var(--accent); }
        .show-completed-toggle { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem; }
        .show-completed-toggle input { accent-color: var(--accent); }

        /* Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .dashboard-card { background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-tertiary) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
        .dashboard-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.75rem; }
        .dashboard-stat { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent); }
        .dashboard-label { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .dashboard-list { margin-top: 1rem; max-height: 200px; overflow-y: auto; }
        .dashboard-list-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .dashboard-list-item:last-child { border-bottom: none; }
        .dashboard-list-item .date { color: var(--warning); font-family: 'Space Mono', monospace; font-size: 0.75rem; }

        /* Categories */
        .categories-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .categories-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .categories-header h3 { font-size: 0.875rem; font-weight: 600; }
        .category-list { list-style: none; }
        .category-item { border-bottom: 1px solid var(--border); }
        .category-item:last-child { border-bottom: none; }
        .category-btn { width: 100%; padding: 0.875rem 1.25rem; background: none; border: none; color: var(--text-primary); font-family: inherit; font-size: 0.9rem; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; }
        .category-btn:hover { background: var(--bg-tertiary); }
        .category-btn.active { background: var(--bg-tertiary); color: var(--accent); border-left: 3px solid var(--accent); }
        .category-arrow { transition: transform 0.2s; font-size: 0.7rem; color: var(--text-muted); }
        .category-item.expanded .category-arrow { transform: rotate(90deg); }
        .subcategory-list { list-style: none; background: var(--bg-primary); display: none; }
        .category-item.expanded .subcategory-list { display: block; }
        .subcategory-btn { width: 100%; padding: 0.75rem 1.25rem 0.75rem 2rem; background: none; border: none; color: var(--text-secondary); font-family: inherit; font-size: 0.85rem; text-align: left; cursor: pointer; transition: all 0.2s; }
        .subcategory-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .subcategory-btn.active { color: var(--accent); background: var(--bg-tertiary); }

        /* Content */
        .content { display: flex; flex-direction: column; gap: 1.5rem; }
        .content-header { display: flex; justify-content: space-between; align-items: center; }
        .content-title { font-size: 1.5rem; font-weight: 600; }
        .breadcrumb { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }
        .breadcrumb span { color: var(--accent); }

        /* Table */
        .table-container { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { padding: 1rem 1.25rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: var(--bg-tertiary); border-bottom: 1px solid var(--border); }
        .table td { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .table tr:last-child td { border-bottom: none; }
        .table tr:hover td { background: var(--bg-tertiary); }
        .table-clickable { cursor: pointer; }

        .qty-badge { display: inline-block; padding: 0.25rem 0.625rem; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 600; }
        .qty-total { background: rgba(59,130,246,0.1); color: var(--info); }
        .qty-available { background: rgba(0,212,170,0.1); color: var(--success); }
        .qty-warning { background: rgba(255,170,0,0.1); color: var(--warning); }

        .status-badge { display: inline-block; padding: 0.25rem 0.625rem; border-radius: 4px; font-size: 0.8rem; font-weight: 500; }
        .status-available { background: rgba(0,212,170,0.1); color: var(--success); }
        .status-rented { background: rgba(255,170,0,0.1); color: var(--warning); }
        .actions-cell { display: flex; gap: 0.5rem; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 1.25rem; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; padding: 0.25rem; line-height: 1; }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.75rem; }

        /* Forms */
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.75rem 1rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
        .form-textarea { min-height: 100px; resize: vertical; }

        /* Unit Detail */
        .unit-detail { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .unit-detail-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
        .unit-detail-info h2 { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }
        .unit-detail-meta { margin-top: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); }
        .unit-detail-body { padding: 1.5rem; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .detail-item { background: var(--bg-tertiary); padding: 1rem; border-radius: 8px; }
        .detail-item-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.5rem; }
        .detail-item-value { font-size: 1rem; font-weight: 500; }
        .history-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .history-timeline { position: relative; padding-left: 1.5rem; }
        .history-timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .history-item { position: relative; padding-bottom: 1.5rem; }

<script>
// =====================================================
// FIREBASE CONFIG
// Sostituisci il blocco qui sotto con il tuo firebaseConfig
// =====================================================
const firebaseConfig = {
    // FIREBASE CONFIG — INCOLLA QUI IL TUO CODICE
    // apiKey: "AIza...",
    // authDomain: "magazzino-xxx.firebaseapp.com",
    // projectId: "magazzino-xxx",
    // storageBucket: "...",
    // messagingSenderId: "...",
    // appId: "..."
};

// =====================================================
// EMAIL AUTORIZZATE — aggiungi le email che possono accedere
// =====================================================
const AUTHORIZED_EMAILS = [
    // "tuaemail@gmail.com",
    // "collega@gmail.com"
];

// =====================================================
// INIT FIREBASE (solo se configurato)
// =====================================================
let firebaseApp = null;
let db = null;
let auth = null;
let firestoreEnabled = false;

function initFirebase() {
    try {
        if (!firebaseConfig.apiKey) {
            console.warn('Firebase non configurato — uso modalità locale (localStorage)');
            return false;
        }
        firebaseApp = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        firestoreEnabled = true;
        console.log('Firebase inizializzato');
        return true;
    } catch (e) {
        console.error('Errore init Firebase:', e);
        return false;
    }
}

// =====================================================
// DATA VERSIONING & MIGRATION
// =====================================================
const CURRENT_VERSION = 4;

function migrateData(data) {
    const dataVersion = data.version || 0;
    if (dataVersion >= CURRENT_VERSION) return data;
    console.log(`Migrazione da v${dataVersion} a v${CURRENT_VERSION}...`);

    if (dataVersion < 1) {
        if (!data.warehouses) {
            data.warehouses = [
                { id: 'multimedia', name: 'Multimedia museum' },
                { id: 'beacon', name: 'Beacon' },
                { id: 'cp', name: 'CP' }
            ];
        }
        if (data.categories) {
            const defaultCatIds = ['proiettori', 'monitor', 'casse', 'player', 'cavi'];
            data.categories.forEach(cat => {
                if (defaultCatIds.includes(cat.id)) cat.isDefault = true;
                if (cat.isDefault === undefined && !cat.warehouseId) cat.isDefault = true;
            });
        }
        if (data.models) {
            data.models.forEach(model => { if (!model.warehouseId) model.warehouseId = 'multimedia'; });
        }
    }
    if (dataVersion < 2) {
        if (data.units) {
            data.units.forEach(unit => {
                if (unit.purchaseDate === undefined) unit.purchaseDate = null;
                if (unit.company === undefined) unit.company = null;
            });
        }
    }
    if (dataVersion < 3) {
        if (!data.jobs) data.jobs = [];
    }
    // v4: no structural changes, just marks new version

    data.version = CURRENT_VERSION;
    console.log('Migrazione completata!');
    return data;
}

const defaultCategories = [
    { id: 'proiettori', name: 'Proiettori', subcategories: [], isCable: false, isDefault: true },
    { id: 'monitor', name: 'Monitor', subcategories: [{ id: 'touch', name: 'Touch' }, { id: 'non-touch', name: 'Non Touch' }], isCable: false, isDefault: true },
    { id: 'casse', name: 'Casse', subcategories: [], isCable: false, isDefault: true },
    { id: 'player', name: 'Player', subcategories: [], isCable: false, isDefault: true },
    { id: 'cavi', name: 'Cavi', subcategories: [{ id: 'cavi-rete', name: 'Cavi di rete' }, { id: 'hdmi', name: 'HDMI' }, { id: 'xlr', name: 'XLR' }], isCable: true, isDefault: true }
];

const defaultData = {
    version: CURRENT_VERSION,
    warehouses: [
        { id: 'multimedia', name: 'Multimedia museum' },
        { id: 'beacon', name: 'Beacon' },
        { id: 'cp', name: 'CP' }
    ],
    categories: [...defaultCategories],
    models: [],
    units: [],
    movements: [],
    jobs: []
};

// =====================================================
// APP STATE
// =====================================================
let appData = null;
let currentUser = null;
let currentView = { type: 'generalHome', warehouseId: null, categoryId: null, subcategoryId: null, modelId: null, unitId: null };
let saveTimeout = null;

// =====================================================
// SAVE / LOAD DATA
// =====================================================
function saveData() {
    // Always save to localStorage as fallback
    localStorage.setItem('magazzinoData', JSON.stringify(appData));
    
    if (firestoreEnabled && db && currentUser) {
        setSyncStatus('syncing');
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            saveToFirestore();
        }, 800); // Debounce 800ms
    }
}

async function saveToFirestore() {
    try {
        const uid = currentUser.uid;
        await db.collection('users').doc(uid).collection('data').doc('main').set(appData);
        setSyncStatus('synced');
    } catch (e) {
        console.error('Errore salvataggio Firestore:', e);
        setSyncStatus('error');
    }
}

async function loadFromFirestore() {
    try {
        const uid = currentUser.uid;
        const doc = await db.collection('users').doc(uid).collection('data').doc('main').get();
        if (doc.exists) {
            const data = doc.data();
            appData = migrateData(data);
            // Sync to localStorage too
            localStorage.setItem('magazzinoData', JSON.stringify(appData));
            setSyncStatus('synced');
            return true;
        }
        return false;
    } catch (e) {
        console.error('Errore caricamento Firestore:', e);
        setSyncStatus('error');
        return false;
    }
}

function setSyncStatus(status) {
    const el = document.getElementById('syncIndicator');
    if (!el) return;
    const labels = { synced: '✓ Sincronizzato', syncing: '⟳ Salvataggio...', error: '✗ Errore sync' };
    const dot = el.querySelector('.sync-dot');
    el.className = `sync-indicator ${status}`;
    el.innerHTML = `<span class="sync-dot ${status === 'syncing' ? 'pulse' : ''}"></span> ${labels[status]}`;
}

// =====================================================
// AUTHENTICATION
// =====================================================
async function signInWithGoogle() {
    if (!firestoreEnabled) {
        // Modalità locale: salta il login
        startApp(null);
        return;
    }
    const btn = document.getElementById('googleLoginBtn');
    const errorEl = document.getElementById('loginError');
    const loadingEl = document.getElementById('loginLoading');
    
    btn.disabled = true;
    errorEl.style.display = 'none';
    loadingEl.style.display = 'block';

    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        const user = result.user;

        // Check authorized emails (if list is not empty)
        if (AUTHORIZED_EMAILS.length > 0 && !AUTHORIZED_EMAILS.includes(user.email)) {
            await auth.signOut();
            errorEl.textContent = `Accesso negato. L'email ${user.email} non è autorizzata.`;
            errorEl.style.display = 'block';
            btn.disabled = false;
            loadingEl.style.display = 'none';
            return;
        }

        // Authorized!
        currentUser = user;
        await startApp(user);

    } catch (e) {
        console.error('Login error:', e);
        const msg = e.code ? 'Errore: ' + e.code : (e.message || 'Errore sconosciuto'); errorEl.textContent = msg;
        errorEl.style.display = 'block';
        btn.disabled = false;
        loadingEl.style.display = 'none';
    }
}

async function signOut() {
    if (!confirm('Vuoi disconnetterti?')) return;
    if (firestoreEnabled && auth) {
        await auth.signOut();
    }
    currentUser = null;
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginScreen').classList.remove('hidden');
}

async function startApp(user) {
    currentUser = user;

    // Load data
    let loaded = false;
    if (firestoreEnabled && user) {
        loaded = await loadFromFirestore();
    }

    if (!loaded) {
        // Fallback: localStorage
        const stored = localStorage.getItem('magazzinoData');
        if (stored) {
            appData = migrateData(JSON.parse(stored));
        } else {
            appData = { ...defaultData };
        }
    }

    if (!appData.jobs) appData.jobs = [];
    saveData();

    // Update UI
    if (user) {
        const avatar = document.getElementById('userAvatar');
        if (user.photoURL) {
            avatar.innerHTML = `<img src="${user.photoURL}" alt="${user.displayName}">`;
        } else {
            avatar.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
        }
        avatar.title = `${user.displayName || user.email} — Clicca per disconnetterti`;
    }

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').style.display = 'block';

    goToGeneralHome();
}

// =====================================================
// UTILITY FUNCTIONS
// =====================================================
function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function isWithinDays(dateStr, days) {
    if (!dateStr) return false;
    const date = new Date(dateStr);
    const now = new Date();
    const futureDate = new Date();
    futureDate.setDate(now.getDate() + days);
    return date >= now && date <= futureDate;
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span>${type === 'success' ? '✓' : '✗'}</span> ${message}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// =====================================================
// QR CODE GENERATOR
// =====================================================
function generateQRCode(unitId) {
    const unit = appData.units.find(u => u.id === unitId);
    const model = appData.models.find(m => m.id === unit.modelId);
    if (!unit || !model) return;

    const qrData = `MAGAZZINO:${unit.modelId}|UNIT:${unit.id}|SERIAL:${unit.serialNumber}`;

    openModal(`
        <div class="modal-header">
            <h2 class="modal-title">🔲 QR Code — ${unit.serialNumber}</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="qr-container">
                <div id="qrCodeCanvas"></div>
                <div class="qr-label">
                    <strong>${model.name}</strong><br>
                    S/N: ${unit.serialNumber}
                </div>
                <div style="font-size: 0.75rem; color: var(--text-muted); background: var(--bg-tertiary); padding: 0.5rem 1rem; border-radius: 6px; font-family: 'Space Mono', monospace; word-break: break-all; text-align: center;">
                    ${qrData}
                </div>
            </div>
        </div>
        <div class="modal-footer" style="justify-content: center; gap: 1rem;">
            <button class="btn btn-secondary" onclick="downloadQR('${unit.serialNumber}')">💾 Salva immagine</button>
            <button class="btn btn-primary" onclick="printQRLabel('${unitId}')">🖨️ Stampa etichetta</button>
        </div>
    `);

    // Generate QR after modal is rendered
    setTimeout(() => {
        const container = document.getElementById('qrCodeCanvas');
        if (container && typeof QRCode !== 'undefined') {
            new QRCode(container, {
                text: qrData,
                width: 220,
                height: 220,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    }, 100);
}

function downloadQR(serialNumber) {
    const qrEl = document.querySelector('#qrCodeCanvas canvas') || document.querySelector('#qrCodeCanvas img');
    if (!qrEl) { showToast('QR non ancora generato', 'error'); return; }

    const unit = appData.units.find(u => u.serialNumber === serialNumber);
    const model = unit ? appData.models.find(m => m.id === unit.modelId) : null;
    const modelName = model ? model.name : '';

    let qrSrc = qrEl.tagName === 'CANVAS' ? qrEl.toDataURL('image/png') : qrEl.src;

    const padding = 16;
    const qrSize = 220;
    const fontSize1 = 16;
    const fontSize2 = 13;
    const totalH = qrSize + padding * 3 + fontSize1 + 8 + fontSize2;

    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = qrSize + padding * 2;
    finalCanvas.height = totalH;
    const ctx = finalCanvas.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

    const img = new Image();
    img.onload = function() {
        ctx.drawImage(img, padding, padding, qrSize, qrSize);

        ctx.fillStyle = '#000000';
        ctx.font = `bold ${fontSize1}px Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(modelName, finalCanvas.width / 2, qrSize + padding * 2 + fontSize1 - 4);

        ctx.font = `${fontSize2}px monospace`;
        ctx.fillStyle = '#444444';
        ctx.fillText('S/N: ' + serialNumber, finalCanvas.width / 2, qrSize + padding * 2 + fontSize1 + 8 + fontSize2);

        const a = document.createElement('a');
        a.href = finalCanvas.toDataURL('image/png');
        a.download = `QR_${serialNumber}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };
    img.src = qrSrc;
}

function printQRLabel(unitId) {
    const unit = appData.units.find(u => u.id === unitId);
    const model = appData.models.find(m => m.id === unit.modelId);
    const canvas = document.querySelector('#qrCodeCanvas canvas') || document.querySelector('#qrCodeCanvas img');
    if (!canvas) { showToast('QR non ancora generato', 'error'); return; }

    let imgSrc = canvas.tagName === 'CANVAS' ? canvas.toDataURL('image/png') : canvas.src;

    const printWin = window.open('', '_blank');
    printWin.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>Etichetta — ${unit.serialNumber}</title>
            <style>
                body { font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: white; }
                .label { text-align: center; padding: 1rem; border: 2px solid #000; border-radius: 8px; max-width: 260px; }
                .label img { width: 200px; height: 200px; }
                .label-title { font-size: 0.9rem; font-weight: 700; margin: 0.5rem 0 0.25rem; }
                .label-serial { font-family: monospace; font-size: 0.8rem; color: #555; }
                @media print { @page { margin: 5mm; } }
            </style>
        </head>
        <body>
            <div class="label">
                <img src="${imgSrc}" alt="QR Code">
                <div class="label-title">${model.name}</div>
                <div class="label-serial">S/N: ${unit.serialNumber}</div>
            </div>
            <script>window.onload = () => { window.print(); }<\/script>
        </body>
        </html>
    `);
    printWin.document.close();
}

// =====================================================
// QR SCANNER
// =====================================================
let html5QrCode = null;
let scannerActive = false;

function openScannerPage() {
    document.getElementById('scannerPage').classList.remove('hidden');
    document.getElementById('scannerResultContent').innerHTML = '<p style="color: var(--text-muted);">Punta la fotocamera verso un QR code del prodotto...</p>';
    
    setTimeout(() => {
        startScanner();
    }, 300);
}

function closeScanner() {
    if (html5QrCode && scannerActive) {
        html5QrCode.stop().catch(() => {});
        scannerActive = false;
    }
    document.getElementById('scannerPage').classList.add('hidden');
}

function startScanner() {
    if (typeof Html5Qrcode === 'undefined') {
        document.getElementById('scannerResultContent').innerHTML = '<p style="color: var(--danger);">Libreria scanner non disponibile. Verifica la connessione internet.</p>';
        return;
    }

    html5QrCode = new Html5Qrcode('reader');
    
    Html5Qrcode.getCameras().then(cameras => {
        if (!cameras || cameras.length === 0) {
            document.getElementById('scannerResultContent').innerHTML = '<p style="color: var(--danger);">Nessuna fotocamera trovata.</p>';
            return;
        }

        // Prefer back camera
        const camera = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];

        html5QrCode.start(
            camera.id,
            { fps: 10, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0 },
            (decodedText) => {
                handleQRScan(decodedText);
            },
            () => {} // ignore errors
        ).then(() => {
            scannerActive = true;
        }).catch(err => {
            document.getElementById('scannerResultContent').innerHTML = `<p style="color: var(--danger);">Errore fotocamera: ${err}</p>`;
        });

    }).catch(err => {
        document.getElementById('scannerResultContent').innerHTML = `<p style="color: var(--danger);">Errore accesso fotocamera: ${err}</p>`;
    });
}

function handleQRScan(qrText) {
    // Parse format: MAGAZZINO:{modelId}|UNIT:{unitId}|SERIAL:{serial}
    const parts = {};
    qrText.split('|').forEach(part => {
        const [key, val] = part.split(':');
        if (key && val) parts[key.trim()] = val.trim();
    });

    const unitId = parts['UNIT'];
    const unit = unitId ? appData.units.find(u => u.id === unitId) : null;
    const model = unit ? appData.models.find(m => m.id === unit.modelId) : null;

    if (!unit || !model) {
        // Also try serial search as fallback
        const serial = parts['SERIAL'];
        const unitBySerial = serial ? appData.units.find(u => u.serialNumber === serial) : null;
        if (unitBySerial) {
            handleQRScan(`MAGAZZINO:${unitBySerial.modelId}|UNIT:${unitBySerial.id}|SERIAL:${unitBySerial.serialNumber}`);
            return;
        }
        document.getElementById('scannerResultContent').innerHTML = `
            <p style="color: var(--warning);">⚠️ Prodotto non riconosciuto.</p>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">Dati letti: ${qrText}</p>
        `;
        return;
    }

    const isAvailable = unit.location === 'Magazzino';
    const warehouse = appData.warehouses.find(w => w.id === model.warehouseId);

    document.getElementById('scannerResultContent').innerHTML = `
        <div class="scanner-unit-card">
            <div class="scanner-unit-name">${model.name}</div>
            <div class="scanner-unit-serial">S/N: ${unit.serialNumber} · ${warehouse ? warehouse.name : ''}</div>
            <div style="margin-bottom: 0.75rem;">
                <span class="status-badge ${isAvailable ? 'status-available' : 'status-rented'}">${unit.location}</span>
                ${!isAvailable && unit.returnDate ? `<span style="color: var(--text-muted); font-size: 0.8rem; margin-left: 0.5rem;">Rientro: ${formatDate(unit.returnDate)}</span>` : ''}
            </div>
            <div class="scanner-actions">
                ${isAvailable
                    ? `<button class="btn btn-secondary" onclick="scannerRentUnit('${unit.id}')">📤 Registra Uscita</button>`
                    : `<button class="btn btn-primary" onclick="scannerReturnUnit('${unit.id}')">📥 Registra Rientro</button>`
                }
                <button class="btn btn-secondary" onclick="closeScanner(); goToUnitFromGeneral('${unit.id}')">👁 Dettaglio</button>
            </div>
        </div>
    `;
}

function scannerReturnUnit(unitId) {
    returnUnit(unitId);
    closeScanner();
    showToast('Rientro registrato ✓');
}

function scannerRentUnit(unitId) {
    // Stop scanner, show rent form in a small modal overlay
    const unit = appData.units.find(u => u.id === unitId);
    if (!unit) return;

    document.getElementById('scannerResultContent').innerHTML = `
        <div class="scanner-unit-card">
            <div class="scanner-unit-name" style="margin-bottom: 0.75rem;">Registra Uscita</div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem;">
                <input type="text" id="scannerDestination" placeholder="Destinazione..." style="padding: 0.6rem; background: #222; border: 1px solid #444; border-radius: 6px; color: white; font-size: 0.9rem; font-family: inherit;">
                <input type="date" id="scannerReturnDate" style="padding: 0.6rem; background: #222; border: 1px solid #444; border-radius: 6px; color: white; font-size: 0.9rem; font-family: inherit;">
            </div>
            <div class="scanner-actions">
                <button class="btn btn-primary" onclick="confirmScannerRent('${unitId}')">✓ Conferma</button>
                <button class="btn btn-secondary" onclick="openScannerPage()">✕ Annulla</button>
            </div>
        </div>
    `;
}

function confirmScannerRent(unitId) {
    const destination = document.getElementById('scannerDestination').value.trim();
    const returnDate = document.getElementById('scannerReturnDate').value;

    if (!destination) { showToast('Inserisci destinazione', 'error'); return; }
    if (!returnDate) { showToast('Inserisci data rientro', 'error'); return; }

    const unit = appData.units.find(u => u.id === unitId);
    unit.location = destination;
    unit.returnDate = returnDate;
    appData.movements.push({
        id: generateId(),
        unitId,
        destination,
        dateOut: new Date().toISOString().split('T')[0],
        dateReturn: null
    });

    saveData();
    closeScanner();
    showToast('Uscita registrata ✓');
}

function updateGeneralDashboard() {
    const upcomingReturns = appData.units.filter(u => isWithinDays(u.returnDate, 30));
    const countEl = document.getElementById('generalReturnsCount');
    const listEl = document.getElementById('generalReturnsList');
    if (countEl) countEl.textContent = upcomingReturns.length;
    if (listEl) {
        const listHtml = upcomingReturns.sort((a, b) => new Date(a.returnDate) - new Date(b.returnDate)).slice(0, 10).map(unit => {
            const model = appData.models.find(m => m.id === unit.modelId);
            return `<div class="dashboard-list-item" onclick="goToUnitFromGeneral('${unit.id}')" style="cursor: pointer;"><span>${model ? model.name : ''} - ${unit.serialNumber}</span><span class="date">${formatDate(unit.returnDate)}</span></div>`;
        }).join('');
        listEl.innerHTML = listHtml || '<p style="color: var(--text-muted); font-size: 0.85rem;">Nessun rientro previsto</p>';
    }
}

function goToUnitFromGeneral(unitId) {
    const unit = appData.units.find(u => u.id === unitId);
    if (unit) {
        const model = appData.models.find(m => m.id === unit.modelId);
        if (model) { selectWarehouse(model.warehouseId); setTimeout(() => renderUnitDetail(unitId), 100); }
    }
}

// CATEGORY FUNCTIONS
// =====================================================
function getCategoriesForWarehouse(warehouseId) {
    return appData.categories.filter(cat => cat.isDefault || cat.warehouseId === warehouseId);
}

function renderCategories() {
    if (!currentView.warehouseId) return;
    const categories = getCategoriesForWarehouse(currentView.warehouseId);
    const list = document.getElementById('categoryList');
    list.innerHTML = categories.map(cat => {
        const hasSubcategories = cat.subcategories && cat.subcategories.length > 0;
        return `
            <li class="category-item" data-id="${cat.id}">
                <button class="category-btn" onclick="toggleCategory('${cat.id}')">
                    <span>${cat.name}</span>
                    ${hasSubcategories ? '<span class="category-arrow">▶</span>' : ''}
                </button>
                ${hasSubcategories ? `<ul class="subcategory-list">${cat.subcategories.map(sub => `<li><button class="subcategory-btn" onclick="selectSubcategory('${cat.id}', '${sub.id}')">${sub.name}</button></li>`).join('')}</ul>` : ''}
            </li>`;
    }).join('');
}

function toggleCategory(categoryId) {
    const category = appData.categories.find(c => c.id === categoryId);
    const item = document.querySelector(`.category-item[data-id="${categoryId}"]`);
    if (category.subcategories && category.subcategories.length > 0) {
        item.classList.toggle('expanded');
    } else {
        selectCategory(categoryId);
    }
}

function selectCategory(categoryId) {
    document.querySelectorAll('.category-btn, .subcategory-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.category-item[data-id="${categoryId}"] .category-btn`).classList.add('active');
    currentView = { ...currentView, type: 'category', categoryId, subcategoryId: null, modelId: null, unitId: null };
    renderModels(categoryId, null);
}

function selectSubcategory(categoryId, subcategoryId) {
    document.querySelectorAll('.category-btn, .subcategory-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    currentView = { ...currentView, type: 'subcategory', categoryId, subcategoryId, modelId: null, unitId: null };
    renderModels(categoryId, subcategoryId);
}

// =====================================================
// MODELS FUNCTIONS
// =====================================================
function getModels(categoryId, subcategoryId) {
    return appData.models.filter(m =>
        m.warehouseId === currentView.warehouseId &&
        m.categoryId === categoryId &&
        (subcategoryId ? m.subcategoryId === subcategoryId : !m.subcategoryId || m.subcategoryId === null)
    );
}

function renderModels(categoryId, subcategoryId) {
    const category = appData.categories.find(c => c.id === categoryId);
    const subcategory = subcategoryId ? category.subcategories.find(s => s.id === subcategoryId) : null;
    const models = getModels(categoryId, subcategoryId);
    const isCable = category.isCable;
    let breadcrumb = category.name;
    if (subcategory) breadcrumb += ` / <span>${subcategory.name}</span>`;

    let content = `
        <div class="content-header">
            <div>
                <h1 class="content-title">${subcategory ? subcategory.name : category.name}</h1>
                <div class="breadcrumb">${breadcrumb}</div>
            </div>
            <button class="btn btn-primary" onclick="openAddModelModal('${categoryId}', ${subcategoryId ? `'${subcategoryId}'` : 'null'}, ${isCable})">+ Aggiungi Modello</button>
        </div>
    `;

    if (models.length === 0) {
        content += `<div class="empty-state"><div class="empty-state-icon">📦</div><h3>Nessun modello</h3><p>Aggiungi il primo modello a questa categoria</p></div>`;
    } else {
        content += `<div class="table-container"><table class="table"><thead><tr><th>Modello</th><th>Qtà Totale</th><th>In Magazzino</th><th>Azioni</th></tr></thead><tbody>`;
        models.forEach(model => {
            let totalQty, availableQty;
            if (isCable) {
                totalQty = model.totalQty || 0;
                availableQty = model.availableQty || 0;
            } else {
                const units = appData.units.filter(u => u.modelId === model.id);
                totalQty = units.length;
                availableQty = units.filter(u => u.location === 'Magazzino').length;
            }
            content += `
                <tr class="${isCable ? '' : 'table-clickable'}" ${isCable ? '' : `onclick="renderUnits('${model.id}')"`}>
                    <td><strong>${model.name}</strong></td>
                    <td><span class="qty-badge qty-total">${totalQty}</span></td>
                    <td><span class="qty-badge ${availableQty === 0 ? 'qty-warning' : 'qty-available'}">${availableQty}</span></td>
                    <td>
                        <div class="actions-cell" onclick="event.stopPropagation()">
                            ${isCable ? `
                                <button class="btn btn-sm btn-secondary" onclick="openCableMovementModal('${model.id}', 'out')">- Uscita</button>
                                <button class="btn btn-sm btn-primary" onclick="openCableMovementModal('${model.id}', 'in')">+ Entrata</button>
                            ` : `<button class="btn btn-sm btn-secondary" onclick="openAddUnitModal('${model.id}')">+ Unità</button>`}
                            <button class="btn btn-sm btn-secondary" onclick="openEditModelModal('${model.id}')">✎</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteModel('${model.id}')">✗</button>
                        </div>
                    </td>
                </tr>`;
        });
        content += `</tbody></table></div>`;
    }
    document.getElementById('mainContent').innerHTML = content;
}

    const subcategory = model.subcategoryId ? category.subcategories.find(s => s.id === model.subcategoryId) : null;
    const units = appData.units.filter(u => u.modelId === modelId);
    currentView = { ...currentView, type: 'units', modelId };

    let breadcrumb = category.name;
    if (subcategory) breadcrumb += ` / ${subcategory.name}`;
    breadcrumb += ` / <span>${model.name}</span>`;

    let content = `
        <div class="content-header">
            <div>
                <h1 class="content-title">${model.name}</h1>
                <div class="breadcrumb">${breadcrumb}</div>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <button class="btn btn-secondary" onclick="goBack()">← Indietro</button>

// =====================================================
// MODAL FORMS
// =====================================================
function openAddModelModal(categoryId, subcategoryId, isCable) {
    openModal(`
        <div class="modal-header">
            <h2 class="modal-title">Aggiungi Modello</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Nome Modello</label><input type="text" class="form-input" id="modelName" placeholder="Es. Epson EB-L1070"></div>
            ${isCable ? `<div class="form-group"><label class="form-label">Quantità Totale</label><input type="number" class="form-input" id="modelQty" value="0" min="0"></div><div class="form-group"><label class="form-label">Quantità in Magazzino</label><input type="number" class="form-input" id="modelAvailQty" value="0" min="0"></div>` : ''}
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
            <button class="btn btn-primary" onclick="addModel('${categoryId}', ${subcategoryId ? `'${subcategoryId}'` : 'null'}, ${isCable})">Aggiungi</button>
        </div>
    `);
}

function addModel(categoryId, subcategoryId, isCable) {
    const name = document.getElementById('modelName').value.trim();
    if (!name) { showToast('Inserisci il nome del modello', 'error'); return; }
    const model = { id: generateId(), name, categoryId, subcategoryId: subcategoryId || null, warehouseId: currentView.warehouseId };
    if (isCable) {
        model.totalQty = parseInt(document.getElementById('modelQty').value) || 0;
        model.availableQty = parseInt(document.getElementById('modelAvailQty').value) || 0;
    }
    appData.models.push(model);
    saveData(); closeModal(); renderModels(categoryId, subcategoryId);
    showToast('Modello aggiunto con successo');
}

function openEditModelModal(modelId) {
    const model = appData.models.find(m => m.id === modelId);
    const category = appData.categories.find(c => c.id === model.categoryId);
    const isCable = category.isCable;
    openModal(`
        <div class="modal-header">
            <h2 class="modal-title">Modifica Modello</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Nome Modello</label><input type="text" class="form-input" id="modelName" value="${model.name}"></div>
            ${isCable ? `<div class="form-group"><label class="form-label">Quantità Totale</label><input type="number" class="form-input" id="modelQty" value="${model.totalQty || 0}" min="0"></div><div class="form-group"><label class="form-label">Quantità in Magazzino</label><input type="number" class="form-input" id="modelAvailQty" value="${model.availableQty || 0}" min="0"></div>` : ''}
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
            <button class="btn btn-primary" onclick="updateModel('${modelId}', ${isCable})">Salva</button>
        </div>
    `);
}

function updateModel(modelId, isCable) {
    const model = appData.models.find(m => m.id === modelId);
    model.name = document.getElementById('modelName').value.trim();
    if (isCable) {
        model.totalQty = parseInt(document.getElementById('modelQty').value) || 0;

function rentUnit(unitId) {
    const destination = document.getElementById('rentDestination').value.trim();

    unit.returnDate = returnDate;

    const unit = appData.units.find(u => u.id === unitId);
    const activeMovement = appData.movements.find(m => m.unitId === unitId && !m.dateReturn);
    if (activeMovement) activeMovement.dateReturn = new Date().toISOString().split('T')[0];
    unit.location = 'Magazzino';
    unit.returnDate = null;
    saveData(); updateDashboard();
    if (currentView.type === 'unitDetail') renderUnitDetail(unitId);

    openModal(`
        <div class="modal-header">

        </div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Quantità</label><input type="number" class="form-input" id="cableQty" value="1" min="1" ${type === 'out' ? `max="${maxQty}"` : ''}></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
            <button class="btn btn-primary" onclick="moveCables('${modelId}', '${type}')">Conferma</button>
        </div>
    `);
}

function moveCables(modelId, type) {
    const qty = parseInt(document.getElementById('cableQty').value) || 0;
    const model = appData.models.find(m => m.id === modelId);
    if (type === 'out') {
        if (qty > model.availableQty) { showToast('Quantità non disponibile', 'error'); return; }
        model.availableQty -= qty;
    } else {
        model.availableQty += qty;
        if (model.availableQty > model.totalQty) model.totalQty = model.availableQty;
    }
    saveData(); closeModal(); renderModels(model.categoryId, model.subcategoryId);
    showToast(`${type === 'out' ? 'Uscita' : 'Entrata'} registrata`);
}

function updateDashboard() {
    if (!currentView.warehouseId) return;
    const warehouseModelIds = appData.models.filter(m => m.warehouseId === currentView.warehouseId).map(m => m.id);
    const upcomingReturns = appData.units.filter(u => warehouseModelIds.includes(u.modelId) && isWithinDays(u.returnDate, 30));
    const countEl = document.getElementById('returnsCount');
    if (countEl) countEl.textContent = upcomingReturns.length;
    const listEl = document.getElementById('returnsList');
    if (listEl) {
        listEl.innerHTML = upcomingReturns.sort((a, b) => new Date(a.returnDate) - new Date(b.returnDate)).slice(0, 10).map(unit => {
            const model = appData.models.find(m => m.id === unit.modelId);
            return `<div class="dashboard-list-item" onclick="renderUnitDetail('${unit.id}')" style="cursor: pointer;"><span>${model ? model.name : ''} - ${unit.serialNumber}</span><span class="date">${formatDate(unit.returnDate)}</span></div>`;
        }).join('') || '<p style="color: var(--text-muted); font-size: 0.85rem;">Nessun rientro previsto</p>';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('globalSearch').addEventListener('input', function(e) {
        if (!currentView.warehouseId) return;
        const query = e.target.value.toLowerCase().trim();
        if (query.length < 2) {
            if (currentView.type === 'search') {
                const warehouse = appData.warehouses.find(w => w.id === currentView.warehouseId);
                document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div><h3>${warehouse.name}</h3><p>Seleziona una categoria dal menu a sinistra</p></div>`;
            }
            return;
        }
        currentView = { ...currentView, type: 'search' };
        const warehouseModels = appData.models.filter(m => m.warehouseId === currentView.warehouseId);
        const warehouseModelIds = warehouseModels.map(m => m.id);
        const modelResults = warehouseModels.filter(m => m.name.toLowerCase().includes(query)).map(m => {
            const cat = appData.categories.find(c => c.id === m.categoryId);
            return { type: 'model', id: m.id, title: m.name, meta: cat ? cat.name : '', categoryId: m.categoryId, subcategoryId: m.subcategoryId, isCable: cat ? cat.isCable : false };
        });
        const unitResults = appData.units.filter(u => warehouseModelIds.includes(u.modelId) && u.serialNumber.toLowerCase().includes(query)).map(u => {
            const model = appData.models.find(m => m.id === u.modelId);
            const cat = model ? appData.categories.find(c => c.id === model.categoryId) : null;
            return { type: 'unit', id: u.id, title: u.serialNumber, meta: model ? `${cat ? cat.name + ' / ' : ''}${model.name}` : '', location: u.location };
        });
        const allResults = [...modelResults, ...unitResults];
        let content = `<div class="content-header"><div><h1 class="content-title">Risultati ricerca</h1><div class="breadcrumb">${allResults.length} risultati per "<span>${query}</span>"</div></div></div><div class="search-results">`;
        if (allResults.length === 0) {
            content += `<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>Nessun risultato</h3><p>Prova con termini diversi</p></div>`;
        } else {
            allResults.forEach(result => {
                content += `<div class="search-result-item" onclick="${result.type === 'model' ? (result.isCable ? `renderModels('${result.categoryId}', ${result.subcategoryId ? `'${result.subcategoryId}'` : 'null'})` : `renderUnits('${result.id}')`) : `renderUnitDetail('${result.id}')`}"><div class="search-result-title">${result.title}</div><div class="search-result-meta">${result.meta}${result.location ? ` • ${result.location}` : ''}</div></div>`;
            });
        }
        content += '</div>';
        document.getElementById('mainContent').innerHTML = content;
    });
});

let showCompletedJobs = false;

function updateJobsCount() {
    const pendingJobs = appData.jobs ? appData.jobs.filter(j => !j.completed).length : 0;
    const countEl = document.getElementById('jobsCount');
    if (countEl) countEl.textContent = pendingJobs;
}

function openJobsView() {
    currentView = { type: 'jobs' };
    document.getElementById('warehouseTabs').style.display = 'none';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('mainContainer').classList.add('no-sidebar');
    renderJobsView();
}

function renderJobsView() {
    const jobs = appData.jobs || [];
    const filteredJobs = showCompletedJobs ? jobs : jobs.filter(j => !j.completed);
    const sortedJobs = filteredJobs.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return new Date(a.date) - new Date(b.date);
    });

    let content = `
        <div class="jobs-container">
            <div class="content-header">
                <div>
                    <h1 class="content-title">Gestione Lavori</h1>
                    <div class="breadcrumb">Pianifica e organizza i tuoi lavori</div>
                </div>
                <div style="display: flex; gap: 0.75rem;">
                    <button class="btn btn-secondary" onclick="goToGeneralHome()">← Torna alla Home</button>
                    <button class="btn btn-primary" onclick="openAddJobModal()">+ Nuovo Lavoro</button>
                </div>
            </div>
            <div class="show-completed-toggle">
                <input type="checkbox" id="showCompleted" ${showCompletedJobs ? 'checked' : ''} onchange="toggleShowCompleted()">
                <label for="showCompleted">Mostra lavori completati</label>
            </div>
    `;

    if (sortedJobs.length === 0) {
        content += `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>Nessun lavoro</h3><p>${showCompletedJobs ? 'Non ci sono lavori registrati' : 'Non ci sono lavori in programma'}</p></div>`;
    } else {
        sortedJobs.forEach(job => {
            const jobDate = new Date(job.date);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const isPast = jobDate < today && !job.completed;

            content += `
                <div class="job-card ${job.completed ? 'completed' : ''}">
                    <div class="job-header">
                        <div>
                            <div class="job-title">${job.name}</div>
                            <div class="job-date ${isPast ? 'past' : ''}">${formatDate(job.date)}${isPast ? ' - IN RITARDO' : ''}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <span class="job-status-badge ${job.completed ? 'completed' : 'pending'}">${job.completed ? 'Completato' : 'In programma'}</span>
                            <div class="actions-cell">
                                ${!job.completed ? `<button class="btn btn-sm btn-primary" onclick="toggleJobComplete('${job.id}')">✓ Completa</button>` : `<button class="btn btn-sm btn-secondary" onclick="toggleJobComplete('${job.id}')">↩ Riapri</button>`}
                                <button class="btn btn-sm btn-secondary" onclick="openEditJobModal('${job.id}')">✎</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteJob('${job.id}')">✗</button>
                            </div>
                        </div>
                    </div>
                    <div class="job-body">
                        ${job.notes ? `<div class="job-section"><div class="job-section-title">Note</div><div class="job-notes">${job.notes.replace(/\n/g, '<br>')}</div></div>` : ''}
                        ${(job.materials && job.materials.length > 0) ? `
                            <div class="job-section">
                                <div class="job-section-title">Materiale dal magazzino</div>
                                <div class="material-list">
                                    ${job.materials.map(mat => {
                                        const model = appData.models.find(m => m.id === mat.modelId);
                                        return `<div class="material-item"><span class="material-name">${model ? model.name : 'N/D'}</span><span class="material-qty">×${mat.quantity}</span></div>`;
                                    }).join('')}
                                </div>
                            </div>` : ''}
                        ${(job.externalMaterials && job.externalMaterials.length > 0) ? `
                            <div class="job-section">
                                <div class="job-section-title">Materiale esterno</div>
                                <div class="material-list">
                                    ${job.externalMaterials.map(mat => `
                                        <div class="material-item external">
                                            <div><span class="material-name">${mat.name}</span>${mat.supplier ? `<div class="material-details">${mat.supplier}</div>` : ''}</div>
                                            <span class="material-qty">×${mat.quantity}${mat.price ? ` · €${mat.price}` : ''}</span>
                                        </div>`).join('')}
                                </div>
                            </div>` : ''}
                    </div>
                </div>`;
        });
    }

    content += '</div>';
    document.getElementById('mainContent').innerHTML = content;
}

function toggleShowCompleted() {
    showCompletedJobs = document.getElementById('showCompleted').checked;
    renderJobsView();
}

function toggleJobComplete(jobId) {
    const job = appData.jobs.find(j => j.id === jobId);
    if (job) { job.completed = !job.completed; saveData(); renderJobsView(); showToast(job.completed ? 'Lavoro completato' : 'Lavoro riaperto'); }
