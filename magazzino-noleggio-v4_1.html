    appData.warehouses.forEach(w => { modelsByWarehouse[w.id] = { name: w.name, models: appData.models.filter(m => m.warehouseId === w.id) }; });
    let materialSelectorHtml = '';
    appData.warehouses.forEach(w => {
        const models = modelsByWarehouse[w.id].models;
        if (models.length > 0) {
            materialSelectorHtml += `<div style="padding: 0.5rem 1rem; background: var(--bg-tertiary); font-weight: 600; font-size: 0.85rem;">${w.name}</div>`;
            models.forEach(model => {
                const category = appData.categories.find(c => c.id === model.categoryId);
                materialSelectorHtml += `<div class="material-selector-item"><div><div style="font-weight: 500;">${model.name}</div><div style="font-size: 0.8rem; color: var(--text-muted);">${category ? category.name : ''}</div></div><input type="number" min="0" value="0" data-model-id="${model.id}" class="model-qty-input"></div>`;
            });
        }
    });
    if (!materialSelectorHtml) materialSelectorHtml = '<p style="padding: 1rem; color: var(--text-muted);">Nessun modello disponibile.</p>';

    openModal(`
        <div class="modal-header">
            <h2 class="modal-title">Nuovo Lavoro</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
            <div class="form-group"><label class="form-label">Nome Lavoro *</label><input type="text" class="form-input" id="jobName" placeholder="Es. Evento Milano"></div>
            <div class="form-group"><label class="form-label">Data *</label><input type="date" class="form-input" id="jobDate"></div>
            <div class="form-group"><label class="form-label">Note</label><textarea class="form-textarea" id="jobNotes" placeholder="Note aggiuntive..."></textarea></div>
            <div class="form-group"><label class="form-label">Materiale dal magazzino</label><div class="material-selector">${materialSelectorHtml}</div></div>
            <div class="form-group"><label class="form-label">Materiale da acquistare/noleggiare</label><div id="externalMaterialsList" class="external-materials-list"></div><button type="button" class="add-external-btn" onclick="addExternalMaterialRow()">+ Aggiungi materiale esterno</button></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
            <button class="btn btn-primary" onclick="addJob()">Crea Lavoro</button>
        </div>
    `);
}

function addExternalMaterialRow() {
    const list = document.getElementById('externalMaterialsList');
    const row = document.createElement('div');
    row.className = 'external-material-row';
    row.innerHTML = `<input type="text" placeholder="Nome" class="ext-name"><input type="number" min="1" value="1" placeholder="Qtà" class="ext-qty"><input type="text" placeholder="Fornitore" class="ext-supplier"><input type="number" min="0" step="0.01" placeholder="Prezzo €" class="ext-price"><button type="button" onclick="this.parentElement.remove()">✗</button>`;
    list.appendChild(row);
}

function collectExternalMaterials() {
    const rows = document.querySelectorAll('.external-material-row');
    const materials = [];
    rows.forEach(row => {
        const name = row.querySelector('.ext-name').value.trim();
        const quantity = parseInt(row.querySelector('.ext-qty').value) || 1;
        const supplier = row.querySelector('.ext-supplier').value.trim();
        const price = row.querySelector('.ext-price').value;
        if (name) materials.push({ name, quantity, supplier: supplier || null, price: price ? parseFloat(price) : null });
    });
    return materials;
}

function addJob() {
    const name = document.getElementById('jobName').value.trim();
    const date = document.getElementById('jobDate').value;
    const notes = document.getElementById('jobNotes').value.trim();
    if (!name) { showToast('Inserisci il nome del lavoro', 'error'); return; }
    if (!date) { showToast('Inserisci la data', 'error'); return; }
    const materials = [];
    document.querySelectorAll('.model-qty-input').forEach(input => {
        const qty = parseInt(input.value) || 0;
        if (qty > 0) materials.push({ modelId: input.dataset.modelId, quantity: qty });
    });
    const job = { id: generateId(), name, date, notes, materials, externalMaterials: collectExternalMaterials(), completed: false };
    if (!appData.jobs) appData.jobs = [];
    appData.jobs.push(job);
    saveData(); closeModal(); renderJobsView();
    showToast('Lavoro creato con successo');
}

function openEditJobModal(jobId) {
    const job = appData.jobs.find(j => j.id === jobId);
    if (!job) return;
    const modelsByWarehouse = {};
    appData.warehouses.forEach(w => { modelsByWarehouse[w.id] = { name: w.name, models: appData.models.filter(m => m.warehouseId === w.id) }; });
    let materialSelectorHtml = '';
    appData.warehouses.forEach(w => {
        const models = modelsByWarehouse[w.id].models;
        if (models.length > 0) {
            materialSelectorHtml += `<div style="padding: 0.5rem 1rem; background: var(--bg-tertiary); font-weight: 600; font-size: 0.85rem;">${w.name}</div>`;
            models.forEach(model => {
                const category = appData.categories.find(c => c.id === model.categoryId);
                const existingMat = job.materials ? job.materials.find(m => m.modelId === model.id) : null;
                const qty = existingMat ? existingMat.quantity : 0;
                materialSelectorHtml += `<div class="material-selector-item"><div><div style="font-weight: 500;">${model.name}</div><div style="font-size: 0.8rem; color: var(--text-muted);">${category ? category.name : ''}</div></div><input type="number" min="0" value="${qty}" data-model-id="${model.id}" class="model-qty-input"></div>`;
            });
        }
    });
    if (!materialSelectorHtml) materialSelectorHtml = '<p style="padding: 1rem; color: var(--text-muted);">Nessun modello disponibile.</p>';
    let externalMaterialsHtml = '';
    if (job.externalMaterials && job.externalMaterials.length > 0) {
        job.externalMaterials.forEach(mat => {
            externalMaterialsHtml += `<div class="external-material-row"><input type="text" placeholder="Nome" class="ext-name" value="${mat.name || ''}"><input type="number" min="1" value="${mat.quantity || 1}" placeholder="Qtà" class="ext-qty"><input type="text" placeholder="Fornitore" class="ext-supplier" value="${mat.supplier || ''}"><input type="number" min="0" step="0.01" placeholder="Prezzo €" class="ext-price" value="${mat.price || ''}"><button type="button" onclick="this.parentElement.remove()">✗</button></div>`;
        });
    }
    openModal(`
        <div class="modal-header">
            <h2 class="modal-title">Modifica Lavoro</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
            <div class="form-group"><label class="form-label">Nome Lavoro *</label><input type="text" class="form-input" id="jobName" value="${job.name}"></div>
            <div class="form-group"><label class="form-label">Data *</label><input type="date" class="form-input" id="jobDate" value="${job.date}"></div>
            <div class="form-group"><label class="form-label">Note</label><textarea class="form-textarea" id="jobNotes">${job.notes || ''}</textarea></div>
            <div class="form-group"><label class="form-label">Materiale dal magazzino</label><div class="material-selector">${materialSelectorHtml}</div></div>
            <div class="form-group"><label class="form-label">Materiale da acquistare/noleggiare</label><div id="externalMaterialsList" class="external-materials-list">${externalMaterialsHtml}</div><button type="button" class="add-external-btn" onclick="addExternalMaterialRow()">+ Aggiungi materiale esterno</button></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
            <button class="btn btn-primary" onclick="updateJob('${jobId}')">Salva</button>
        </div>
    `);
}

function updateJob(jobId) {
    const job = appData.jobs.find(j => j.id === jobId);
    if (!job) return;
    const name = document.getElementById('jobName').value.trim();
    const date = document.getElementById('jobDate').value;
    const notes = document.getElementById('jobNotes').value.trim();
    if (!name) { showToast('Inserisci il nome del lavoro', 'error'); return; }
    if (!date) { showToast('Inserisci la data', 'error'); return; }
    const materials = [];
    document.querySelectorAll('.model-qty-input').forEach(input => {
        const qty = parseInt(input.value) || 0;
        if (qty > 0) materials.push({ modelId: input.dataset.modelId, quantity: qty });
    });
    job.name = name; job.date = date; job.notes = notes;
    job.materials = materials; job.externalMaterials = collectExternalMaterials();
    saveData(); closeModal(); renderJobsView();
    showToast('Lavoro aggiornato');
}

// =====================================================
// NAVIGATION
// =====================================================
function goBack() {
    if (currentView.modelId && currentView.categoryId) {
        renderModels(currentView.categoryId, currentView.subcategoryId);
    }
}

// =====================================================
// EXPORT / IMPORT
// =====================================================
function exportData() {
    const dataStr = JSON.stringify(appData, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const now = new Date();
    const dateStr = now.toISOString().split('T')[0];
    const timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '-');
    const filename = `magazzino-backup-${dateStr}_${timeStr}.json`;
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('Backup esportato con successo');
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importedData = JSON.parse(e.target.result);
            if (!importedData.categories || !importedData.models || !importedData.units || !importedData.movements) {
                throw new Error('Struttura file non valida');
            }
            if (!confirm(`Importare questo backup?\n\n- ${importedData.categories.length} categorie\n- ${importedData.models.length} modelli\n- ${importedData.units.length} unità\n- ${importedData.movements.length} movimenti\n- Versione: ${importedData.version || 0}\n\nI dati attuali verranno sovrascritti.`)) return;
            appData = migrateData(importedData);
            saveData(); goToGeneralHome();
            showToast('Backup importato con successo');
        } catch (error) {
            showToast('Errore: file non valido', 'error');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// =====================================================
// STARTUP
// =====================================================
(function init() {
    const fbReady = initFirebase();

    if (fbReady && auth) {
        // Firebase is configured: listen for auth state
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Check email whitelist
                if (AUTHORIZED_EMAILS.length > 0 && !AUTHORIZED_EMAILS.includes(user.email)) {
                    await auth.signOut();
                    const errEl = document.getElementById('loginError');
                    errEl.textContent = `Accesso negato. Email ${user.email} non autorizzata.`;
                    errEl.style.display = 'block';
                    return;
                }
                currentUser = user;
                await startApp(user);
            } else {
                // Not logged in: show login screen
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').style.display = 'none';
            }
        });
    } else {
        // Firebase not configured: skip login, use localStorage
        document.getElementById('loginScreen').classList.add('hidden');
        startApp(null);
    }
})();
</script>
